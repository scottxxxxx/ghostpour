# Per-app version registry. Served by GET /v1/app/version with the
# X-App-Bundle-Id header.
#
# Keyed by Apple bundle identifier (or Android applicationId once we
# add Android). Each entry has a `platforms` block so the same registry
# can answer for iOS, Android, macOS, etc. without a wire shape rev.
#
# `latest` is a nested block containing the version + the upgrade URL
# that should land users on THAT specific build. URL belongs next to
# the version it represents so an operator can never forget to update
# the link when bumping the version — they're updated as one block.
#
# `min_supported_version` is a flat threshold (any version below this
# is hard-gated by the client). It does not have its own URL today; if
# a hard-gated user taps an upgrade prompt, they get latest.upgrade_url.
#
# Updates: bump `latest.version` + `latest.upgrade_url` together on
# every TestFlight or App Store release. Bump `min_supported_version`
# only when you want to force a hard upgrade on old installs.
#
# Adding a new app = add a new top-level key. No code change needed.
# Unknown bundle id returns 404 so a misconfigured client surfaces
# immediately instead of silently reading the wrong app's data.

com.shouldersurf.ShoulderSurf:
  platforms:
    ios:
      latest:
        # Bump on every release. Client shows a dismissible toast when
        # the device's CFBundleShortVersionString is below this.
        #
        # Current shipping build is 1.14 (build 749 on TestFlight),
        # installable 2026-07-17 (SS installable signal + on Scott's
        # device). Carries the memory_signals flip (metadata passthrough
        # on CQ-chipped project chat sends, contract v1) shipped SS-side
        # 2026-07-16. TestFlight-only release: `latest` drives the
        # dismissible soft toast and upgrade_url is still the TestFlight
        # invite, so a TestFlight-installable build meets the bump bar.
        # Bump on every TestFlight or App Store release that goes out
        # to users. Soft-banner pipeline verified end-to-end 2026-06-06.
        version: "1.14"
        # CFBundleVersion (numeric string). Clients only consult this
        # when their marketing version equals `version` above:
        #   - TestFlight installs whose build number is < this show the
        #     same soft update banner as a version mismatch.
        #   - App Store installs ignore it entirely.
        # Bump alongside `version` on every release. The bump pair from
        # SS will always come as "version + build", e.g. "1.13 build 450".
        build: "749"
        # Tap target for the upgrade prompt. Currently the live
        # TestFlight invite linked from the beta button on
        # shouldersurf.com. Swap to https://apps.apple.com/app/id<APPID>
        # once the app is in the App Store.
        upgrade_url: "https://testflight.apple.com/join/ubRWVcXF"
      # Per-channel latest (2026-07-20). The client sends X-App-Distribution
      # from StoreKit 2 AppTransaction.environment: production -> appstore,
      # sandbox/xcode -> testflight. GP serves the matching block so a
      # TestFlight user is nudged to the latest beta (TestFlight invite) and
      # an App Store user to the latest App Store release (App Store link),
      # never crossing the streams. Clients that don't send the header fall
      # back to the `latest` block above (today's behavior). Bump the
      # relevant channel on each release.
      latest_by_channel:
        testflight:
          version: "1.14"
          build: "749"
          upgrade_url: "https://testflight.apple.com/join/ubRWVcXF"
        appstore:
          # SET AT APP STORE LAUNCH. version "0.0" means "no App Store
          # release yet": no App Store user is ever below it, so no update
          # toast fires and we never route an App Store user to a build that
          # isn't on the App Store. At launch, set version + build to the
          # shipped App Store build and upgrade_url to
          # https://apps.apple.com/app/id<APPID>.
          version: "0.0"
          build: "0"
          upgrade_url: ""
      # Hard floor. Client refuses to operate below this. Bump only
      # when an older build has a real correctness or security issue.
      min_supported_version: "1.0"
      # Force-upgrade switch (#force-version-gate). FALSE = today's behavior:
      # min_supported_version drives a non-blocking "update required" banner only.
      # TRUE = a true hard gate: the client full-screens, AND the gateway rejects
      # this app's below-floor calls (LLM / Context Quilt / config) with HTTP 426.
      # Off by default so a mistaken min_supported_version bump can never brick
      # every install at once. See app/services/version_gate.py.
      min_supported_blocking: false
      # Surgical cutoff: exact marketing versions or build numbers to 426 even
      # when above the floor (one compromised build). Strings, matched against
      # X-App-Version or X-App-Build. Empty = none blocked.
      blocked_versions: []
