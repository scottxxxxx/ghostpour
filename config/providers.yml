# =============================================================================
# GhostPour Provider Registry
#
# To add a new provider:
#   1. If it uses the OpenAI chat completions format, just add it here with
#      api_format: "openai" — no code changes needed.
#   2. If it uses a custom format, use api_format: "generic" and define
#      request_format + response_mappings (see template at bottom of file).
#   3. Add the env var to your .env file.
#
# Models list is optional. If omitted, any model ID is accepted.
# =============================================================================

providers:
  openai:
    display_name: "OpenAI"
    api_format: "openai"
    base_url: "https://api.openai.com/v1/chat/completions"
    auth_header: "Authorization"
    auth_prefix: "Bearer "
    extra_headers: {}
    env_key: "openai_api_key"
    models:
      - id: "gpt-5.2"
        supports_vision: true
        max_tokens_default: 4096
      - id: "gpt-5-mini"
        supports_vision: true
        max_tokens_default: 4096
      - id: "gpt-5-nano"
        supports_vision: false
        max_tokens_default: 4096

  anthropic:
    display_name: "Anthropic"
    api_format: "anthropic"
    base_url: "https://api.anthropic.com/v1/messages"
    auth_header: "x-api-key"
    auth_prefix: ""
    extra_headers:
      anthropic-version: "2023-06-01"
    env_key: "anthropic_api_key"
    models:
      - id: "claude-sonnet-4-6"
        supports_vision: true
        max_tokens_default: 4096
      - id: "claude-opus-4-6"
        supports_vision: true
        max_tokens_default: 4096
      - id: "claude-haiku-4-5-20251001"
        supports_vision: true
        max_tokens_default: 4096

  google:
    display_name: "Google Gemini"
    api_format: "gemini"
    base_url: "https://generativelanguage.googleapis.com/v1beta/models"
    auth_header: "x-goog-api-key"
    auth_prefix: ""
    extra_headers: {}
    env_key: "google_api_key"
    models:
      - id: "gemini-3.1-pro-preview"
        supports_vision: true
        max_tokens_default: 4096
      - id: "gemini-3-flash-preview"
        supports_vision: true
        max_tokens_default: 4096

  xai:
    display_name: "xAI (Grok)"
    api_format: "openai"
    base_url: "https://api.x.ai/v1/chat/completions"
    auth_header: "Authorization"
    auth_prefix: "Bearer "
    extra_headers: {}
    env_key: "xai_api_key"
    models:
      - id: "grok-4"
        supports_vision: true
        max_tokens_default: 4096
      - id: "grok-4-1-fast-reasoning"
        supports_vision: true
        max_tokens_default: 4096

  deepseek:
    display_name: "DeepSeek"
    api_format: "openai"
    base_url: "https://api.deepseek.com/chat/completions"
    auth_header: "Authorization"
    auth_prefix: "Bearer "
    extra_headers: {}
    env_key: "deepseek_api_key"
    models:
      - id: "deepseek-v4-flash"
        supports_vision: false
        max_tokens_default: 4096
      - id: "deepseek-v4-pro"
        supports_vision: false
        max_tokens_default: 4096

  kimi:
    display_name: "Kimi (Moonshot)"
    api_format: "openai"
    base_url: "https://kimi-k2.ai/api/v1/chat/completions"
    auth_header: "Authorization"
    auth_prefix: "Bearer "
    extra_headers: {}
    env_key: "kimi_api_key"
    models:
      - id: "kimi-k2.5"
        supports_vision: true
        max_tokens_default: 4096
      - id: "kimi-k2-0905-preview"
        supports_vision: true
        max_tokens_default: 4096

  qwen:
    display_name: "Qwen (Alibaba)"
    api_format: "openai"
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1/chat/completions"
    auth_header: "Authorization"
    auth_prefix: "Bearer "
    extra_headers: {}
    env_key: "qwen_api_key"
    models:
      - id: "qwen3.5-plus"
        supports_vision: true
        max_tokens_default: 4096
      - id: "qwen3.5-flash"
        supports_vision: true
        max_tokens_default: 4096

  # ===========================================================================
  # TEMPLATE: Adding a custom provider via the generic adapter
  #
  # Uncomment and modify the block below. No Python code changes needed.
  #
  # The generic adapter uses dot-path notation to extract fields from the
  # provider's JSON response. For example, "choices.0.message.content" means
  # response_json["choices"][0]["message"]["content"].
  #
  # All fields in the provider's usage block are automatically captured in
  # the response's `usage` dict, including fields that don't exist yet
  # (cached tokens, reasoning tokens, etc.).
  # ===========================================================================
  #
  # my_provider:
  #   display_name: "My Provider"
  #   api_format: "generic"
  #   base_url: "https://api.myprovider.com/v1/chat"
  #   auth_header: "Authorization"
  #   auth_prefix: "Bearer "
  #   extra_headers: {}
  #   env_key: "my_provider_api_key"
  #
  #   # How to build the HTTP request body
  #   request_format:
  #     model_field: "model"                # Key name for model ID in request
  #     messages_field: "messages"           # Key name for messages array
  #     system_in_messages: true             # true = system role in messages array
  #     # system_prompt_field: "system"      # If system_in_messages: false, top-level key
  #     max_tokens_field: "max_tokens"       # Key name for max tokens
  #     image_format: "openai"              # "openai", "anthropic", "gemini", or "none"
  #
  #   # How to extract fields from the JSON response (dot-path notation)
  #   response_mappings:
  #     text: "choices.0.message.content"          # Required: where the response text lives
  #     input_tokens: "usage.prompt_tokens"         # Optional: input token count
  #     output_tokens: "usage.completion_tokens"    # Optional: output token count
  #     finish_reason: "choices.0.finish_reason"    # Optional: any extra fields you want
  #     response_id: "id"
  #     model_version: "model"
  #
  #   # Which JSON paths contain usage/metadata dicts to capture (all keys auto-flattened)
  #   usage_paths:
  #     - "usage"
  #
  #   # Models list (optional — omit to allow any model ID)
  #   models:
  #     - id: "my-model-v1"
  #       supports_vision: true
  #       max_tokens_default: 4096
