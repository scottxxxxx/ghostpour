# =============================================================================
# App registry — the single source of truth for which iOS apps GhostPour
# serves and where each app's client-fetched config lives.
#
# Identity arrives on the wire as the `X-App-ID` request header (set into
# `request.state.app_id` by request_logging middleware). Config resolution
# (app/routers/config.py get_config) and the admin dashboard both read this
# registry.
#
# Resolution contract (Phase B / #249) — ALWAYS fails open:
#   - Missing / blank / "unknown" X-App-ID  -> `default_app` (shouldersurf).
#     A header-less client is ShoulderSurf by definition.
#   - Known id (case-insensitive) -> serve from that app's `dir` (with flat
#     fallback during the B2 migration; see config.py).
#   - UNRECOGNIZED id -> default_app too, with a logged warning. ShoulderSurf
#     has months of TestFlight builds in the field; we never break their
#     config fetch over an unexpected app id. Register new apps here before
#     launch so they get their own dir instead of the fallback.
#
# `dir` is the subdirectory under config/remote/ (bundle) and the persistent
# remote-config dir (overlay) that holds this app's files. Until Phase B2
# moves files, the dirs are empty and resolution falls back to today's flat
# filenames, so adding this registry changes nothing on its own.
# =============================================================================

default_app: shouldersurf

apps:
  shouldersurf:
    dir: shouldersurf
    label: ShoulderSurf
  techrehearsal:
    dir: techrehearsal
    label: Tech Rehearsal
    # Per-app budget gate (#249, app/services/tr_budget.py). DORMANT until
    # `enabled: true`. TR free/paid is the X-TR-Entitlement header, independent
    # of the SS tier; caps are USD spend per UTC calendar month, summed from
    # this user's techrehearsal usage_log rows. Enable ONLY after TR's
    # entitlement-carrying build is live in the field (marker
    # tr-2026-06-22-entitlement-1 on X-TR-Build) so real calls send the header.
    budget:
      enabled: false
      monthly_cost_limit_usd:
        free: 5.0
        paid: 25.0
    # Per-app tier overrides (#249): values that REPLACE the user's SS-tier
    # value when X-App-ID resolves to this app. TR users share the SS user row,
    # so their tier (e.g. pro) carries SS defaults; these scope app-specific
    # caps without editing the shared tiers.yml. Applied ONLY for
    # app_id=techrehearsal — SS (shouldersurf / no header) is never touched.
    tier_overrides:
      max_images_per_request: 1   # TR live-interview single-shot cap (TR ask 2026-06-23; tunable)
