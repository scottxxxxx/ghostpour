# =============================================================================
# GhostPour Subscription Tiers — SINGLE SOURCE OF TRUTH
#
# This file drives:
#   1. Server-side enforcement (model access, rate limits, quotas)
#   2. iOS app display via GET /v1/tiers (descriptions, feature_bullets, gating)
#   3. iOS app constraints via GET /v1/usage/me (summary, images, features)
#
# Feature gating uses three states (defined in features.yml):
#   enabled  — Feature fully active (check + apply)
#   teaser   — Run check, return metadata, don't apply (for upgrade nudges)
#   disabled — Don't run at all
#
# Field reference (see private ops repo for tier economics rationale):
#   monthly_cost_limit_usd  — per-user per-month spend cap. -1 = unlimited.
#   trial_cost_limit_usd    — temporary cap during free-trial window.
#   daily_cost_limit_usd    — per-day spend cap. -1 = unlimited.
#   daily_token_limit       — per-day token cap. -1 = unlimited.
#   requests_per_minute     — rate limit.
#   summary_mode            — "delta" or "choice" (full or delta).
#   summary_interval_minutes
#   allowed_providers       — provider names; "*" allows all.
#   allowed_models          — model identifiers; "*" allows all.
#   max_images_per_request
#   hours_per_month         — display value (cost-enforced under the hood).
#   storekit_product_id     — App Store product ID for purchase mapping.
#   features                — per-feature state (enabled/teaser/disabled).
#   feature_bullets         — display strings for the upgrade page.
#
# On tier upgrade: unused allocation carries forward as dollar value.
# =============================================================================

tiers:
  free:
    display_name: "Free"
    description: "Try AI-powered meeting assistance with a small free credit."
    default_model: "anthropic/claude-haiku-4-5-20251001"
    monthly_cost_limit_usd: 0.35
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 5
    summary_mode: "delta"
    summary_interval_minutes: 10
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 1
    hours_per_month: 5
    storekit_product_id: ""
    features:
      context_quilt: "disabled"
      meeting_reports: "enabled"
      project_chat: "teaser"
    feature_bullets:
      - "~5 hours/month of AI assistance"
      - "Real-time auto-summaries"
      - "On-device transcription (unlimited)"
      - "1 image per query"

  plus:
    display_name: "Plus"
    description: "Unlimited AI-powered meeting assistance. Summaries, reports, and project chat."
    default_model: "anthropic/claude-haiku-4-5-20251001"
    monthly_cost_limit_usd: -1
    trial_cost_limit_usd: 2.40
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 20
    summary_mode: "delta"
    summary_interval_minutes: 10
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 3
    hours_per_month: -1
    storekit_product_id: "com.weirtech.shouldersurf.sub.plus.monthly"
    features:
      context_quilt: "teaser"
      meeting_reports: "enabled"
      project_chat: "enabled"
    feature_bullets:
      - "Unlimited meetings with AI assistance"
      - "Standard AI"
      - "Real-time auto-summaries"
      - "Shareable meeting reports"
      - "Project chat across meetings"
      - "3 images per query"

  pro:
    display_name: "Pro"
    description: "Everything in Plus with advanced AI for deeper reports and Meeting Memory."
    default_model: "anthropic/claude-haiku-4-5-20251001"
    monthly_cost_limit_usd: -1
    trial_cost_limit_usd: 5.10
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 30
    summary_mode: "choice"
    summary_interval_minutes: 10
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-haiku-4-5-20251001"
      - "claude-sonnet-4-6"
    max_images_per_request: 5
    hours_per_month: -1
    storekit_product_id: "com.weirtech.shouldersurf.sub.pro.monthly"
    features:
      context_quilt: "enabled"
      meeting_reports: "enabled"
      project_chat: "enabled"
    feature_bullets:
      - "Unlimited meetings with AI assistance"
      - "Advanced AI for reports and analysis"
      - "Full or delta summaries (your choice)"
      - "Shareable meeting reports"
      - "Project chat across meetings"
      - "Meeting Memory: AI remembers past meetings"
      - "5 images per query"

  admin:
    display_name: "Admin"
    description: "Internal admin tier — unlimited access."
    default_model: "anthropic/claude-sonnet-4-6"
    monthly_cost_limit_usd: -1
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 120
    summary_mode: "choice"
    summary_interval_minutes: 10
    allowed_providers:
      - "*"
    allowed_models:
      - "*"
    max_images_per_request: 10
    hours_per_month: -1
    storekit_product_id: ""
    features:
      context_quilt: "enabled"
      meeting_reports: "enabled"
      project_chat: "enabled"
    feature_bullets:
      - "Unlimited AI assistance"
      - "All models and providers"
      - "Meeting Memory"
