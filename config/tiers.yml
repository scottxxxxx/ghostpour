# =============================================================================
# CloudZap Subscription Tiers — SINGLE SOURCE OF TRUTH
#
# This file drives:
#   1. Server-side enforcement (model access, rate limits, quotas)
#   2. iOS app display via GET /v1/tiers (descriptions, feature_bullets, gating)
#   3. iOS app constraints via GET /v1/usage/me (summary, images, features)
#
# Feature gating uses three states (defined in features.yml):
#   enabled  — Feature fully active (check + apply)
#   teaser   — Run check, return metadata, don't apply (for upgrade nudges)
#   disabled — Don't run at all
#
# Pricing basis: 2x markup on average user cost
#   Haiku 4.5:  ~$0.05/hr avg, ~$0.10/hr power user (10-min auto-summary)
#   Sonnet 4.6: ~$0.19/hr avg, ~$0.38/hr power user (15-min auto-summary)
#   Apple takes 15% (Small Business Program)
#
# monthly_cost_limit_usd: calculated from hours × raw model cost (not markup)
#   This is our ACTUAL spend limit per user per month.
#   Standard: 25 hrs × $0.05 = $1.25
#   Pro:      50 hrs × $0.05 = $2.50
#   Ultra:    25 hrs × $0.19 = $4.75
#   Ultra Max:50 hrs × $0.19 = $9.50
#
# On tier upgrade: unused allocation carries forward as dollar value (Option D)
# =============================================================================

tiers:
  free:
    display_name: "Free"
    description: "Try AI-powered meeting assistance with a small free credit."
    default_model: "anthropic/claude-haiku-4-5-20251001"
    monthly_cost_limit_usd: 0.05
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 5
    summary_mode: "delta"
    summary_interval_minutes: 10
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 1
    hours_per_month: 1
    storekit_product_id: ""
    features:
      context_quilt: "disabled"
    feature_bullets:
      - "~1 hour of AI assistance"
      - "Claude Haiku — fast and capable"
      - "Auto-summaries every 10 min"
      - "1 image per query"

  standard:
    display_name: "Standard"
    description: "Monthly AI meeting assistance for regular use."
    default_model: "anthropic/claude-haiku-4-5-20251001"
    monthly_cost_limit_usd: 1.25
    trial_cost_limit_usd: 0.50        # Cap during 7-day free trial (~10 hrs Haiku)
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 15
    summary_mode: "delta"
    summary_interval_minutes: 10
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 1
    hours_per_month: 25
    storekit_product_id: "com.weirtech.shouldersurf.sub.standard.monthly"
    features:
      context_quilt: "teaser"
    feature_bullets:
      - "25 hours/month of AI assistance"
      - "Claude Haiku — fast and capable"
      - "Auto-summaries every 10 minutes"
      - "1 image per query"
      - "Meeting memory available with Pro"

  pro:
    display_name: "Pro"
    description: "More hours, image analysis, and meeting memory."
    default_model: "anthropic/claude-haiku-4-5-20251001"
    monthly_cost_limit_usd: 2.50
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 20
    summary_mode: "delta"
    summary_interval_minutes: 10
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 2
    hours_per_month: 50
    storekit_product_id: "com.weirtech.shouldersurf.sub.pro.monthly"
    features:
      context_quilt: "enabled"
    feature_bullets:
      - "50 hours/month of AI assistance"
      - "Claude Haiku — fast and capable"
      - "Auto-summaries every 10 minutes"
      - "2 images per query"
      - "Context Quilt — AI remembers past meetings"

  ultra:
    display_name: "Ultra"
    description: "Our smartest model with full summary control."
    default_model: "anthropic/claude-sonnet-4-6"
    monthly_cost_limit_usd: 4.75
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 30
    summary_mode: "choice"
    summary_interval_minutes: 15
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 3
    hours_per_month: 25
    storekit_product_id: "com.weirtech.shouldersurf.sub.ultra.monthly"
    features:
      context_quilt: "enabled"
    feature_bullets:
      - "25 hours/month of AI assistance"
      - "Claude Sonnet — our smartest model"
      - "Full or delta summaries (your choice)"
      - "3 images per query"
      - "Context Quilt — AI remembers past meetings"

  ultra_max:
    display_name: "Ultra Max"
    description: "Maximum capacity with our smartest model."
    default_model: "anthropic/claude-sonnet-4-6"
    monthly_cost_limit_usd: 9.50
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 30
    summary_mode: "choice"
    summary_interval_minutes: 15
    allowed_providers:
      - "anthropic"
    allowed_models:
      - "claude-sonnet-4-6"
      - "claude-haiku-4-5-20251001"
    max_images_per_request: 5
    hours_per_month: 50
    storekit_product_id: "com.weirtech.shouldersurf.sub.ultramax.monthly"
    features:
      context_quilt: "enabled"
    feature_bullets:
      - "50 hours/month of AI assistance"
      - "Claude Sonnet — our smartest model"
      - "Full or delta summaries (your choice)"
      - "5 images per query"
      - "Context Quilt — AI remembers past meetings"

  admin:
    display_name: "Admin"
    description: "Internal admin tier — unlimited access."
    default_model: "anthropic/claude-sonnet-4-6"
    monthly_cost_limit_usd: -1
    daily_cost_limit_usd: -1
    daily_token_limit: -1
    requests_per_minute: 120
    summary_mode: "choice"
    summary_interval_minutes: 10
    allowed_providers:
      - "*"
    allowed_models:
      - "*"
    max_images_per_request: 10
    hours_per_month: -1
    storekit_product_id: ""
    features:
      context_quilt: "enabled"
    feature_bullets:
      - "Unlimited AI assistance"
      - "All models and providers"
      - "Context Quilt — cross-meeting memory"
