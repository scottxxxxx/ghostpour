# =============================================================================
# GhostPour Feature Definitions
#
# Each feature can be in one of three states per tier (set in tiers.yml):
#   enabled  — Feature is fully active (run + apply results)
#   teaser   — Run the feature check, return metadata to client, but don't
#              apply results to the query. Used for upgrade nudges.
#   disabled — Feature doesn't run at all
#
# This file defines the metadata for each feature. The per-tier state
# assignments live in tiers.yml under each tier's `features:` dict.
#
# To add a new feature:
#   1. Add an entry here with display_name, description, etc.
#   2. Add per-tier state in tiers.yml
#   3. Implement check/apply functions in app/services/features/<name>.py
# =============================================================================

features:
  context_quilt:
    display_name: "Meeting Memory"
    description: "Your AI remembers past meetings and uses that knowledge automatically."
    teaser_description: "Your AI found connections to your past meetings"
    upgrade_cta: "Upgrade to Pro to unlock Meeting Memory"
    category: "intelligence"
    # The service module in app/services/ that implements this feature.
    # Must expose: async check(user_id, text, metadata) -> dict
    #              async apply(body, check_result) -> updated_body
    #              async on_response(user_id, body, response) -> None
    service_module: "context_quilt"
    capture_skip_modes:
      - "PostMeetingChat"
      - "ProjectChat"
      - "AutoSummary"
      - "PostSessionAnalysis"
    # Free-tier monthly quota for end-of-meeting Memory captures. Decrements
    # only when GP processes a `capture_with_cta` outcome at /v1/capture-transcript.
    # Calendar-month boundary, UTC. Lazy reset (mirrors project_chat_quota).
    # Valid: 0 (no free captures) | 1..10 (N free per month) | -1 (unlimited).
    free_quota_per_month: 1
    # CTA strings for the synthetic memory card injected into the next
    # /v1/quilt/{user_id} fetch. Template variables: {remaining}, {total}.
    cta_strings:
      free_within_quota_footer: "✨ This was your free Memory of {total} this month — Upgrade to Pro to keep building Memory."
      free_no_quota_only: "✨ Want your AI to remember meetings? Upgrade to Pro to start building Memory."

  meeting_reports:
    display_name: "Meeting Reports"
    description: "Generate shareable HTML reports from your meeting transcripts — sentiment, key moments, suggested tags, and your speaker notes."
    teaser_description: "Reports turn your meetings into shareable summaries."
    upgrade_cta: "Upgrade to Plus to generate shareable meeting reports"
    category: "intelligence"

  project_chat:
    display_name: "Project Chat"
    description: "Ask AI questions across all the meetings in a project — your AI knows the context."
    teaser_description: "Project Chat is a Plus feature."
    upgrade_cta: "Upgrade to Plus to use Project Chat"
    category: "intelligence"
    # Server-controlled routing policy. iOS calls /v1/features/project-chat/check
    # before each Project Chat send and branches on the verdict. See
    # docs/wire-contracts/project-chat.md for the full state matrix.
    #
    # gp_chat_flag values:
    #   all              — anyone (logged in or not) can use; routes to user's
    #                      model unless they picked SS AI.
    #   ssai             — login required; SS AI is the routing target
    #                      (overrides user's model for ALL tiers). Free +
    #                      external + no quota gets CTA wrap.
    #   ssai_free_only   — login required; ssai semantics for Free tier
    #                      (override + metered CTA), logged_in semantics for
    #                      paid tiers (respect BYOK). Day-1 default.
    #   logged_in        — login required; uses user's selected model
    #                      (no override). No CTA on Free.
    #   plus             — Plus/Pro required for unrestricted use; Free users
    #                      always get GP-routed responses with a CTA wrap.
    gp_chat_flag: "ssai_free_only"
    # Free-tier monthly quota for CTA-wrapped Project Chats.
    # Valid: 0 (no free uses) | 1..10 (N free per month) | -1 (unlimited)
    # Decrements only when GP processes a send_to_gp_with_cta outcome for a
    # Free user. Calendar-month boundary, UTC. Lazy reset.
    free_quota_per_month: 1
    # CTA strings rendered server-side and surfaced via response.feature_state.cta.
    # Template variables: {remaining}, {total}.
    cta_strings:
      quota_remaining: "You have {remaining} of {total} free Project Chats remaining this month. Upgrade to Plus for unlimited."
      quota_exhausted: "You've used your {total} free Project Chats for this month. Upgrade to Plus for unlimited."
      unlimited: "Project Chat by Shoulder Surf."
      login_required: "Sign in to use Project Chat."
    # DEPRECATED: kept until iOS clients migrate to the policy verdict.
    # The old free-tier intercept (PR #80) returns this when the policy
    # collapses to "deny without verdict" — should rarely fire post-migration.
    teaser_response: "Project Chat is a Plus feature. Upgrade to ask AI questions across all your meetings in this project."
