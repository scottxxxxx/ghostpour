# =============================================================================
# GhostPour Feature Definitions
#
# Each feature can be in one of three states per tier (set in tiers.yml):
#   enabled  — Feature is fully active (run + apply results)
#   teaser   — Run the feature check, return metadata to client, but don't
#              apply results to the query. Used for upgrade nudges.
#   disabled — Feature doesn't run at all
#
# This file defines the metadata for each feature. The per-tier state
# assignments live in tiers.yml under each tier's `features:` dict.
#
# To add a new feature:
#   1. Add an entry here with display_name, description, etc.
#   2. Add per-tier state in tiers.yml
#   3. Implement check/apply functions in app/services/features/<name>.py
# =============================================================================

features:
  context_quilt:
    display_name: "Meeting Memory"
    description: "Your AI remembers past meetings and uses that knowledge automatically."
    teaser_description: "Your AI found connections to your past meetings"
    upgrade_cta: "Upgrade to Pro to unlock Meeting Memory"
    category: "intelligence"
    # The service module in app/services/ that implements this feature.
    # Must expose: async check(user_id, text, metadata) -> dict
    #              async apply(body, check_result) -> updated_body
    #              async on_response(user_id, body, response) -> None
    service_module: "context_quilt"
    capture_skip_modes:
      - "PostMeetingChat"
      - "ProjectChat"
      - "AutoSummary"
      - "PostSessionAnalysis"
