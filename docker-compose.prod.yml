services:
  ghostpour:
    image: ghcr.io/scottxxxxx/ghostpour:latest
    container_name: ghostpour
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ghostpour-data:/app/data
    env_file:
      - .env.prod
    networks:
      - proxy-tier
    # Send container logs to journald so they survive `docker compose
    # up -d` recreates on every deploy. Default json-file driver writes
    # to /var/lib/docker/containers/<id>/<id>-json.log which is deleted
    # when the container is removed — that wiped a hung-request
    # request_id during the 2026-04-27 incident. Query via:
    #   journalctl CONTAINER_NAME=ghostpour --since '...' --until '...'
    logging:
      driver: journald
      options:
        tag: ghostpour

  # Continuous SQLite → GCS replication for DR. Reads the same data
  # volume as the GhostPour app and streams WAL frames to a GCS bucket
  # configured in litestream.yml.
  #
  # Auth: VM's metadata-service identity (Compute Engine default SA).
  # The VM has cloud-platform OAuth scope and the SA has objectAdmin
  # on the replication bucket — google-cloud-storage SDK inside the
  # litestream binary picks this up via Application Default Creds.
  # No key file on disk = no long-lived credentials to leak or rotate.
  #
  # Restore runbook: ghostpour-ops/docs/disaster-recovery.md.
  litestream:
    image: litestream/litestream:0.3.13
    container_name: ghostpour-litestream
    restart: unless-stopped
    volumes:
      - ghostpour-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    command: replicate -config /etc/litestream.yml
    depends_on:
      - ghostpour
    logging:
      driver: journald
      options:
        tag: ghostpour-litestream

volumes:
  ghostpour-data:

networks:
  proxy-tier:
    external: true
