services:
  ghostpour:
    image: ghcr.io/scottxxxxx/ghostpour:latest
    container_name: ghostpour
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ghostpour-data:/app/data
    env_file:
      - .env.prod
    networks:
      - proxy-tier

volumes:
  ghostpour-data:

networks:
  proxy-tier:
    external: true
