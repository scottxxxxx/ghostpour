name: Build & Deploy

on:
  push:
    branches: [main]
    # Docs-only changes don't affect the running image, so skip the
    # rebuild + container recreate (a pointless prod restart otherwise).
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

# Serialize production deploys. Multiple pushes to main (e.g. merging
# several PRs back to back) otherwise trigger concurrent runs that race on
# `docker compose up -d` — a 3-way race once left the container stuck in
# "Created" (app down). With this guard only one deploy runs at a time and a
# newer push supersedes an older queued one, so main HEAD always wins without
# overlapping `up -d` calls. cancel-in-progress is false so an in-flight
# deploy is never killed mid-apply.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # Copy infra config files to the VM. The repo is now the source of
      # truth for docker-compose.prod.yml and litestream.yml — VM-side
      # in-place sed is gone. SCP places into /tmp; the SSH step moves
      # them into /opt/ghostpour with sudo.
      - name: Copy compose + litestream config to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml,litestream.yml"
          target: "/tmp/"

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          script: |
            sudo mv /tmp/docker-compose.prod.yml /opt/ghostpour/docker-compose.prod.yml
            sudo mv /tmp/litestream.yml /opt/ghostpour/litestream.yml
            cd /opt/ghostpour
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod pull
            sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
            sudo docker image prune -af --filter "until=24h"
