# Litestream replication config for the GhostPour SQLite database.
#
# Streams the live SQLite WAL to a GCS bucket continuously so we can
# restore from disaster (VM loss, disk corruption, accidental delete)
# without losing user-visible state (subscriptions, allocation, trial,
# usage). RPO ~seconds. RTO is bounded by `litestream restore` time
# plus container start (~minutes).
#
# Auth: VM metadata-service identity (Compute Engine default SA with
# cloud-platform scope and objectAdmin on the replication bucket).
# litestream picks this up via Application Default Credentials — no
# key file on disk. See ghostpour-ops/docs/disaster-recovery.md for
# the runbook.

dbs:
  - path: /data/cloudzap.db
    replicas:
      - type: gcs
        bucket: gp-prod-archive-dd28494d6d54
        path: cloudzap
        # 30-day retention. Plenty of runway for the case where data
        # corruption isn't noticed for a few days.
        retention: 720h
        # Daily snapshot baselines + continuous WAL between them.
        snapshot-interval: 24h
        # Stream WAL frames every 1s. Tiny GCS write volume at our
        # traffic; gives us seconds-RPO at no meaningful cost.
        sync-interval: 1s
